version: 2

models:
  - name: dim_customer
    description: "Customer dimension shared by account and risk fact tables."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_branch
    description: "Branch/account officer dimension shared across facts."
    columns:
      - name: branch_id
        tests:
          - not_null
          - unique

  - name: dim_date
    description: "Date dimension for snapshot, opening, and scoring dates."
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

  - name: dim_risk_profile
    description: "Risk profile dimension used by fait_customer_risk."
    columns:
      - name: risk_profile_id
        tests:
          - not_null
          - unique
      - name: risk_tier
        tests:
          - not_null
          - unique

  - name: dim_sector
    description: "Sector code dimension."
    columns:
      - name: sector_code
        tests:
          - not_null
          - unique

  - name: dim_industry
    description: "Industry code dimension."
    columns:
      - name: industry_code
        tests:
          - not_null
          - unique

  - name: dim_currency
    description: "Currency reference dimension."
    columns:
      - name: currency_code
        tests:
          - not_null
          - unique

  - name: dim_target
    description: "Target segment reference dimension."
    columns:
      - name: target_code
        tests:
          - not_null
          - unique

  - name: fait_account
    description: "Account fact table with account-level balances and dimensional foreign keys."
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id

  - name: fait_customer_risk
    description: "Customer risk fact table with compliance, fragility, behavioral, and global risk metrics."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: risk_profile_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_risk_profile')
                field: risk_profile_id
